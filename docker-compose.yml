name: radarlink

services:
  deliverable-build:
    build:
      context: .
      dockerfile: docker/Dockerfile.deliverable
      target: build
    image: radarlink-deliverable-build:local
    working_dir: /work/RadarLink_Extended/Montagem
    volumes:
      - ./RadarLink_Extended/Montagem:/work/RadarLink_Extended/Montagem:ro
      - ./build/deliverable:/out
    command:
      - sh
      - -c
      - |
        set -e
        gcc -std=c99 -Wall -Wextra -I src main.c \
          src/interface.c \
          src/process_esp.c \
          src/process_ficheiro.c \
          src/process_geral.c \
          src/process_nef.c \
          -o /out/RadarLink
        chmod +x /out/RadarLink
        echo "Built /out/RadarLink"
        ls -la /out/RadarLink

  deliverable-run:
    build:
      context: .
      dockerfile: docker/Dockerfile.deliverable
      target: runtime
    image: radarlink-deliverable-run:local
    working_dir: /work/RadarLink_Extended/Montagem
    stdin_open: true
    tty: true
    volumes:
      - ./build/deliverable/RadarLink:/work/RadarLink_Extended/Montagem/RadarLink:ro
      - ./RadarLink_Extended/Montagem/cidades:/work/RadarLink_Extended/Montagem/cidades:ro
    entrypoint: ["./RadarLink"]

  doxygen-checkpoint:
    build:
      context: .
      dockerfile: docker/Dockerfile.doxygen
    image: radarlink-doxygen:local
    working_dir: /work
    volumes:
      - .:/work
    command:
      - sh
      - -c
      - |
        set -e
        doxygen Doxyfile.checkpoint

  doxygen-deliverable:
    build:
      context: .
      dockerfile: docker/Dockerfile.doxygen
    image: radarlink-doxygen:local
    working_dir: /work
    volumes:
      - .:/work
    command:
      - sh
      - -c
      - |
        set -e
        doxygen Doxyfile.deliverable

  mkdocs-build:
    build:
      context: .
      dockerfile: docker/Dockerfile.mkdocs
    image: radarlink-mkdocs:local
    working_dir: /work
    volumes:
      - .:/work
    command: ["build"]

  mkdocs-serve:
    build:
      context: .
      dockerfile: docker/Dockerfile.mkdocs
    image: radarlink-mkdocs:local
    working_dir: /work
    volumes:
      - .:/work
    ports:
      - "8000:8000"
    command: ["serve", "-a", "0.0.0.0:8000"]
