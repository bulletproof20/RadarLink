site_name: RadarLink
site_url: https://bulletproof20.github.io/RadarLink/
repo_url: https://github.com/bulletproof20/RadarLink
edit_uri: ""
site_description: >-
  Academic, technical, and historical record of the RadarLink antenna-network
  program — from evaluated checkpoint through extended deliverable to
  documentation preservation and GitHub Pages publication.

nav:
  - Home: index.md
  - Story:
      - Academic Context: story/academic-context.md
      - Assignment and Problem: story/assignment-and-problem.md
      - Checkpoint vs Deliverable: story/checkpoint-to-deliverable.md
      - Checkpoint (Academic Edition): story/checkpoint-academic-edition.md
      - Deliverable (RadarLink Extended): story/deliverable-radarlink-extended.md
      - Learning Outcomes: story/learning-outcomes.md
  - Guide:
      - How to Run: guide/how-to-run.md
  - Preservation:
      - Repository Evolution: preservation/repository-evolution.md
      - Reproducibility: preservation/reproducibility.md
  - Reference:
      - API Overview: reference/index.md
      - Checkpoint API: reference/checkpoint-api.md
      - Deliverable API: reference/deliverable-api.md

theme:
  name: material
  language: en
  logo: assets/icon.ico
  favicon: assets/icon.ico
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - attr_list
  - md_in_html
